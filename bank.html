<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTU Bank - Terminal Mainframe</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="bank-container">
        <h1>HTU BANKING SYSTEM v1.02</h1>
        <p>Current Session: Secure User Account</p>
        
        <hr>

        <!-- Balance Display -->
        <h2>ACCOUNT SUMMARY</h2>
        <p><strong>Available Balance:</strong> $<span id="balance">5000.00</span> USD</p>

        <!-- Transaction Form -->
        <h2>RECORD NEW TRANSACTION</h2>
        <form id="transaction-form">
            <div class="form-group">
                <label for="type">Action Type</label>
                <select id="type">
                    <option value="withdraw">Withdrawal</option>
                    <option value="deposit">Deposit</option>
                </select>
            </div>
            <div class="form-group">
                <label for="amount">Amount (USD)</label>
                <input type="number" id="amount" required min="1" step="0.01">
            </div>
            <button type="submit">EXECUTE TRANSACTION</button>
        </form>

        <!-- History Table -->
        <h2>TRANSACTION LOG</h2>
        <table>
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody id="log-table-body">
                <tr>
                    <td>Initial System Deposit</td>
                    <td>+$5000.00</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
